services:
  caddy:
    image: caddy:2.8-alpine
    container_name: caddy_server
    restart: unless-stopped
    # NET_ADMIN: required for `tc` (traffic control) to run in this container
    # Backend shares network namespace with Caddy via network_mode: service:caddy
    # -> tc commands executed from backend will directly shape Caddy's media traffic
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"        # HTTP (redirects to HTTPS)
      - "443:443"      # HTTPS / HTTP/2
      - "443:443/udp"  # HTTP/3 (QUIC) - UDP port 443 must be opened
    volumes:
      # Mount entire caddy_config directory into /etc/caddy
      # Includes Caddyfile and certs/server.crt + certs/server.key
      - ./caddy_config:/etc/caddy:ro
      - ./media:/srv/media:ro
      - ./media-2:/srv/media-2:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: node_backend
    restart: unless-stopped
    # IMPORTANT: Share network namespace with Caddy container
    # -> backend and Caddy share eth0
    # -> tc qdisc on eth0 from backend = tc on Caddy's eth0
    # -> Traffic shaping DIRECTLY affects media/video served to browsers
    network_mode: "service:caddy"
    # NET_ADMIN: permission to run tc commands (traffic control / netem)
    cap_add:
      - NET_ADMIN
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    healthcheck:
      # Use localhost because backend and Caddy share network namespace
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - caddy

networks:
  app-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config: