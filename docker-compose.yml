services:
  caddy:
    image: caddy:2.8-alpine
    container_name: caddy_server
    restart: unless-stopped
    # NET_ADMIN: can thiet de backend goi `docker exec caddy_server tc` len Caddy
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"        # HTTP (Caddy tu dong redirect sang HTTPS)
      - "443:443"      # HTTPS / HTTP2
      - "443:443/udp"  # HTTP/3 (QUIC) - bat buoc phai mo UDP 443
    volumes:
      - ./caddy_config/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./media:/srv/media:ro
      - ./media-2:/srv/media-2:ro
      - caddy_data:/data    # TLS cert (Let's Encrypt hoac self-signed)
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: node_backend
    restart: unless-stopped
    # NET_ADMIN: de co the chay tc qua docker exec vao caddy container
    cap_add:
      - NET_ADMIN
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      # CORS_ORIGIN: production nen dat domain cu the, dev co the de *
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      # Ten container Caddy de backend goi `docker exec` khi ap dung tc
      - CADDY_CONTAINER_NAME=caddy_server
    volumes:
      # Mount Docker socket: cho phep backend goi `docker exec caddy_server tc ...`
      # De tc co hieu luc tren Caddy container (noi phuc vu thuc su media/traffic)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config: