services:
  caddy:
    image: caddy:2.8-alpine
    container_name: caddy_server
    restart: unless-stopped
    # NET_ADMIN: can thiet de `tc` (traffic control) chay trong container nay
    # Backend chia se network namespace voi Caddy qua network_mode: service:caddy
    # -> tc chay tu backend se anh huong truc tiep traffic Caddy phuc vu media
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"        # HTTP (redirect sang HTTPS)
      - "443:443"      # HTTPS / HTTP/2
      - "443:443/udp"  # HTTP/3 (QUIC) - bat buoc mo UDP port 443
    volumes:
      # Mount toan bo thu muc caddy_config vao /etc/caddy
      # Bao gom: Caddyfile va certs/server.crt + certs/server.key
      - ./caddy_config:/etc/caddy:ro
      - ./media:/srv/media:ro
      - ./media-2:/srv/media-2:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: node_backend
    restart: unless-stopped
    # QUAN TRONG: Chia se network namespace voi Caddy container
    # -> backend va Caddy dung chung eth0
    # -> tc qdisc tren eth0 tu backend = tc tren Caddy's eth0
    # -> Traffic shaping anh huong TRUC TIEP den media/video phuc vu cho browser
    network_mode: "service:caddy"
    # NET_ADMIN: quyen chay lenh tc (traffic control / netem)
    cap_add:
      - NET_ADMIN
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    healthcheck:
      # Dung localhost vi backend va Caddy chia se network namespace
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - caddy

networks:
  app-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config: