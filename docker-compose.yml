services:
  caddy:
    image: caddy:2.8-alpine
    container_name: caddy_server
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      # FILL: Neu ban co domain thi dat SITE_ADDRESS=your-domain.com
      # FILL: Neu chi co server IP thi dat SITE_ADDRESS=:80 de chay HTTP
      - SITE_ADDRESS=${SITE_ADDRESS:-:80}
    volumes:
      - ./caddy_config/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./media:/srv/media:ro
      - ./media-2:/srv/media-2:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: node_backend
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      # FILL: Production nen dung origin cu the, vi du https://your-domain.com
      # FILL: Neu chi demo nhanh bang IP co the dung * tam thoi
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config: