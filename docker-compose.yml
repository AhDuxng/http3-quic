version: '3.8'

services:
  # Caddy - Reverse proxy ho tro HTTP/3, TLS tu dong
  caddy:
    image: caddy:latest
    container_name: caddy_server
    restart: unless-stopped
    ports:
      - "80:80"        # HTTP (redirect ve HTTPS)
      - "443:443"      # HTTPS (HTTP/1.1, HTTP/2)
      - "443:443/udp"  # HTTP/3 (QUIC) - bat buoc phai mo UDP
    volumes:
      - ./caddy_config/Caddyfile:/etc/caddy/Caddyfile  # Cau hinh Caddy
      - ./media:/srv/media                              # Thu muc file media tinh
      - ./frontend/dist:/srv/frontend                  # Frontend build (cho prod)
      - caddy_data:/data                               # TLS certs (Caddy tu quan ly)
      - caddy_config:/config                           # Caddy runtime config
    networks:
      - app-network

  # Backend - Node.js Express API server
  backend:
    build: ./backend
    container_name: node_backend
    networks:
      - app-network
    environment:
      - HOST=0.0.0.0   # Lang nghe tren tat ca interface cua container
      - PORT=3000
      - CORS_ORIGIN=*  # Dev: cho phep tat ca origin

  # Curl client - Container tien ich de test ket noi noi bo giua cac service
  curl-client:
    image: curlimages/curl:latest
    container_name: curl_tester
    command: tail -f /dev/null  # Giu container chay de exec vao test
    networks:
      - app-network

networks:
  app-network:
    driver: bridge  # Tat ca container cung network co the giao tiep bang ten service

volumes:
  caddy_data:    # Luu tru TLS certificates (tranh cap lai moi lan restart)
  caddy_config:  # Luu tru Caddy runtime config