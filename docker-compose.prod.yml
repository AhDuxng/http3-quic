services:
  caddy:
    image: caddy:latest
    container_name: caddy_server
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy_config/Caddyfile.prod:/etc/caddy/Caddyfile
      - ./video:/srv/video
      - ./frontend/dist:/srv/frontend
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - PORT=${PORT:-3000}
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: node_backend
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    networks:
      - app-network
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-3000}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}

networks:
  app-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
